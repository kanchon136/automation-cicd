# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Java CI with Maven (Local Self-Hosted)

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t kanchon/automation-cicd:latest .

      - name: Deploy to Local Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml --validate=false
          kubectl apply -f k8s/deployment.yaml --validate=false
          kubectl apply -f k8s/service.yaml --validate=false
          
          # --- এখান থেকে অটোমেশনের আসল কাজ শুরু ---
          
          # ১. কুবারনেটিসকে বাধ্য করা যাতে সে নতুন ইমেজ দিয়ে পড রিস্টার্ট দেয়
          kubectl rollout restart deployment/automation-cicd-deployment -n automation
          
          # ২. আপডেট সফল হওয়া পর্যন্ত অপেক্ষা করা
          kubectl rollout status deployment/automation-cicd-deployment -n automation

      - name: Verify Final Status
        run: |
          kubectl get pods -n automation
          kubectl get svc -n automation
          # এন্ডপয়েন্ট চেক করা যাতে কনফার্ম হওয়া যায় পডগুলো কানেক্টেড
          kubectl get ep automation-cicd-service -n automation
